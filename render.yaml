services:
  - type: web
    name: pmri-backend
    env: docker
    dockerfilePath: ./Dockerfile.render
    plan: starter # or free, depending on the user's Render account limits
    region: frankfurt # Deploy close to user location (or singapore/ohio)
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pmri-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://pmri-india.vercel.app" # Replace with actual Vercel URL
      - key: DEMO_MODE
        value: "true"

databases:
  - name: pmri-db
    databaseName: pmri_india
    user: pmri_india
    plan: free
